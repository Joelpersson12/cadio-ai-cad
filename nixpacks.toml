[phases.setup]
nixPkgs = [
  "python311",
  "nodejs_20",
  "mesa",
  "mesa.drivers",
  "libGL",
  "glib",
  "xorg.libX11",
  "xorg.libXrender",
  "xorg.libXext"
]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "cd frontend && npm install"
]
[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "python main.py"
