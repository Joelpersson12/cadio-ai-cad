[phases.setup]
nixPkgs = [
  "python311",
  "nodejs_20",
  "mesa",
  "libGL",
  "glib",
  "xorg.libX11",
  "xorg.libXrender",
  "xorg.libXext"
]

[phases.install]
cmds = [
  "pip install --no-cache-dir -r requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
