name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Hugging Face token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing GitHub Actions secret: HF_TOKEN"
            exit 1
          fi
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            https://huggingface.co/api/whoami-v2 > /dev/null

      - name: Sync files to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Persson12/Cadio-ai-cad
          repo_type: space
          space_sdk: docker
          hf_token: ${{ secrets.HF_TOKEN }}
