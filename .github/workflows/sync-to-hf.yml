name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.23.0"

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "Persson12/Cadio-ai-cad"
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  ".git",
                  ".git/**",
                  ".github",
                  ".github/**",
                  "**/__pycache__/**",
                  "**/node_modules/**",
                  "**/*.pyc",
              ],
          )
          print("Upload complete!")

          # Force a clean (no-cache) rebuild so the Docker image always picks up
          # the new backend code. Without this, HF's layer cache can keep serving
          # stale /api routes even after a successful upload.
          api.restart_space(repo_id=repo_id, factory_reboot=True)
          print("Triggered factory rebuild.")
          EOF
