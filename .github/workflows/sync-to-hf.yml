name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        run: |
          git remote add hf https://Persson12:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Persson12/Cadio-ai-cad
          git push hf main --force
